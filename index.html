<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Parth Khadke personal website coming soon.">
    <title>Parth Khadke | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --background: #050505;
            --white: #ffffff;
            --soft: rgba(255, 255, 255, 0.74);
            --muted: rgba(255, 255, 255, 0.48);
            --quiet: rgba(255, 255, 255, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--background);
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: "Inter", Arial, sans-serif;
            color: var(--white);
            background: var(--background);
        }

        .background {
            position: fixed;
            inset: -18px;
            z-index: 0;
            pointer-events: none;
        }

        .background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.42;
            filter: blur(3px);
            transform: scale(1.02);
        }

        .background::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.08), transparent 34%),
                linear-gradient(180deg, rgba(5, 5, 5, 0.58), rgba(5, 5, 5, 0.88));
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 48px 24px 132px;
            isolation: isolate;
        }

        main {
            width: min(100%, 1080px);
            text-align: center;
            animation: enter 900ms ease-out both;
        }

        h1,
        p {
            margin: 0;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2.25rem, 6.85vw, 6.15rem);
            line-height: 0.94;
            font-weight: 800;
            letter-spacing: clamp(0.06em, 0.62vw, 0.14em);
            text-indent: clamp(0.06em, 0.62vw, 0.14em);
            color: var(--white);
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 45%, #8f8f8f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .status {
            margin-top: 0;
            font-size: clamp(0.82rem, 1.4vw, 1.08rem);
            line-height: 1.7;
            font-weight: 700;
            letter-spacing: 0.42em;
            text-indent: 0.42em;
            color: var(--soft);
        }

        .intro {
            width: min(100%, 560px);
            margin: clamp(22px, 3.2vw, 34px) auto 0;
            font-size: clamp(0.8rem, 1.15vw, 0.97rem);
            line-height: 1.9;
            font-weight: 600;
            letter-spacing: 0.26em;
            text-indent: 0.26em;
            color: rgba(255, 255, 255, 0.9);
        }

        .divider {
            width: min(100%, 460px);
            height: 1px;
            border: 0;
            margin: clamp(26px, 4vw, 42px) auto;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.24), transparent);
        }

        footer {
            position: fixed;
            left: 50%;
            bottom: 34px;
            z-index: 2;
            width: min(100% - 48px, 420px);
            transform: translateX(-50%);
            display: grid;
            justify-items: center;
            gap: 18px;
        }

        .socials {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .socials a {
            width: 42px;
            height: 42px;
            border: 1px solid var(--quiet);
            border-radius: 50%;
            display: inline-grid;
            place-items: center;
            color: var(--soft);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.025);
            transition: color 220ms ease, border-color 220ms ease, background 220ms ease, transform 220ms ease;
        }

        .socials a:hover,
        .socials a:focus-visible {
            color: var(--white);
            border-color: rgba(255, 255, 255, 0.62);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
        }

        .socials a:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.82);
            outline-offset: 4px;
        }

        .socials i {
            font-size: 15px;
        }

        .copyright {
            font-size: 0.72rem;
            line-height: 1;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 680px) {
            body {
                overflow: auto;
            }

            .page {
                padding: 40px 28px 148px;
            }

            h1 {
                font-size: clamp(1.55rem, 7.35vw, 2.85rem);
                letter-spacing: 0.035em;
                text-indent: 0.035em;
            }

            .status {
                font-size: clamp(0.64rem, 2.2vw, 0.82rem);
                letter-spacing: 0.18em;
                text-indent: 0.18em;
            }

            .intro {
                font-size: clamp(0.68rem, 2.4vw, 0.86rem);
                letter-spacing: 0.12em;
                text-indent: 0.12em;
            }

            .divider {
                width: min(100%, 320px);
            }

            footer {
                bottom: 26px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="background" aria-hidden="true">
        <img src="background.svg" alt="">
    </div>

    <div class="page">
        <main aria-label="Coming soon announcement">
            <h1>parthkhadke.me</h1>
            <p class="intro">Software Developer • Builder • Writer</p>
            <hr class="divider">
            <p class="status">Personal Website Under Progress</p>
            <hr class="divider">
        </main>
    </div>

    <footer>
        <nav class="socials" aria-label="Social links">
            <a href="https://github.com/parth-khadke" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github" aria-hidden="true"></i>
            </a>
            <a href="https://x.com/Parth_Khadke_" target="_blank" rel="noopener noreferrer" aria-label="X">
                <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            </a>
            <a href="https://www.linkedin.com/in/parth-khadke-21ab2625a/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            </a>
            <a href="mailto:hello@parthkhadke.me" aria-label="Email">
                <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            </a>
        </nav>
        <p class="copyright">&copy; 2026 Parth Khadke</p>
    </footer>
</body>
</html>
